function getBaseSalary(medium,classLevel){
  if(!medium||!classLevel)return 0;
  const isBM=medium==="বাংলা মিডিয়াম";
  if(isBM){
    if(["Nursery","KG-1","KG-2","Class 1","Class 2","Class 3"].includes(classLevel))return 2000;
    if(["Class 4","Class 5"].includes(classLevel))return 2500;
    if(["Class 6","Class 7","Class 8"].includes(classLevel))return 3000;
    if(["Class 9","Class 10","SSC candidate"].includes(classLevel))return 3500;
    if(["Class 11 (Intermediate 1st Year)","Class 12 (Intermediate 2nd Year)","HSC candidate"].includes(classLevel))return 4000;
    if(classLevel==="University Admission candidate")return 4000;
  }else{
    if(["Nursery","KG-1","KG-2","Class 1","Class 2"].includes(classLevel))return 2500;
    if(["Class 3","Class 4"].includes(classLevel))return 3000;
    if(["Class 5","Class 6"].includes(classLevel))return 3500;
    if(["Class 7","Class 8"].includes(classLevel))return 4000;
    if(["Class 9","Class 10","SSC candidate"].includes(classLevel))return 4500;
    if(["Class 11 (Intermediate 1st Year)","Class 12 (Intermediate 2nd Year)","HSC candidate"].includes(classLevel))return 5000;
    if(classLevel==="University Admission candidate")return 5500;
  }
  return 0;
}
function roundUp500(n){return Math.ceil(n/500)*500;}
function calcSalaryFloor(students){
  const valid=students.filter(s=>s.category&&s.classLevel);
  if(!valid.length)return 0;
  const sal=valid.map(s=>getBaseSalary(s.category,s.classLevel)).sort((a,b)=>b-a);
  if(sal.length===1)return sal[0];
  if(sal.length===2)return roundUp500(sal[0]+sal[1]/1.5);
  if(sal.length===3)return roundUp500(sal[0]+sal[1]/1.5+sal[2]/2);
  return roundUp500(sal[0]+sal[1]/1.5+sal[2]/2+sal[3]/3);
}

function subjectLabel(id){
  const s=SUBJECTS.find(x=>x.id===id);if(!s)return id;
  return s.en?`${s.bn} (${s.en})`:s.bn;
}
